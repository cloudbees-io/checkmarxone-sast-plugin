apiVersion: automation.cloudbees.io/v1alpha1
kind: action
name: checkmarxone-sast-plugin
inputs:
  url:
    description: 'CheckmarxOne base URL' 
    required: true
  tenant:
    description: 'CheckmarxOne tenant name'
    required: true
  api-key:
    description: 'CheckmarxOne API key for authentication'
    required: true
  severity:
    description: 'Filter SAST results by severity. Comma-separated values: critical, high, medium, low, info. Leave empty to include all.'
    required: false
  ref:
    description: 'Flag to indicate the ref that should be archived (same as supplied to checkout)'
    required: false
    default: ''
  workspace-dir:
    description: 'Flag to mention the path where the checked out code will be present'
    required: false
    default: ''
outputs:
  critical-count:
    description: A string containing the number of Critical security findings discovered during the scan.
    value: ${{steps.process-outputs.outputs.critical-count}}
  very-high-count:
    description: A string containing the number of Very High security findings discovered during the scan.
    value: ${{steps.process-outputs.outputs.very-high-count}}
  high-count:
    description: A string containing the number of High security findings discovered during the scan.
    value: ${{steps.process-outputs.outputs.high-count}}
  medium-count:
    description: A string containing the number of Medium security findings discovered during the scan.
    value: ${{steps.process-outputs.outputs.medium-count}}
  low-count:
    description: A string containing the number of Low security findings discovered during the scan.
    value: ${{steps.process-outputs.outputs.low-count}}
  policy-subject:
    description: A json value containing the details about the vulnerability scan summary & details.
    value: ${{steps.process-outputs.outputs.policy-subject}}
  

runs:
  using: composite
  steps:
    - name: Generate sha and ref
      uses: docker://public.ecr.aws/l7o7z1g8/actions/assets-plugin-chain-utils:eda1f86aa17218e8779fae9ff1ac9161b708d07e
      with:
        entrypoint: assets-plugin-chain-utils
        args: get-commit-info
      env:
        INPUT_CLOUDBEES_API_TOKEN: ${{ cloudbees.api.token }}
        INPUT_CLOUDBEES_API_URL: ${{ cloudbees.api.url }}
        INPUT_RUN_ID: ${{ cloudbees.run_id }}
        INPUT_CLOUDBEES_EVENT_PATH: /cloudbees/event.json
        INPUT_REF: ${{ inputs.ref }}
        INPUT_WORKSPACE_DIR: ${{ inputs.workspace-dir }}

    - name: Generate reference files
      uses: docker://public.ecr.aws/l7o7z1g8/actions/assets-plugin-chain-utils:eda1f86aa17218e8779fae9ff1ac9161b708d07e
      with:
        entrypoint: assets-plugin-chain-utils
        args: generate-references --asset-type "CODE"
      env:
        INPUT_CLOUDBEES_API_TOKEN: ${{ cloudbees.api.token }}
        INPUT_CLOUDBEES_API_URL: ${{ cloudbees.api.url }}
        INPUT_RUN_ID: ${{ cloudbees.run_id }}

    - name: Run SCC Scan for tag generation
      uses: docker://public.ecr.aws/l7o7z1g8/actions/assets-scc-scanner:884fecd572bb127890a823acc378f1951e72314a
      continue-on-error: true
      env:
        RUN_ID: ${{ cloudbees.run_id }}
        JOB_ID: ${{ job.id }}
        STEP_ID: ${{ step.internal.id }}
      run: /app/plugin-scc-scanner -mode single

    - name: Run Checkmarx One SAST plugin
      uses: docker://public.ecr.aws/l7o7z1g8/actions/assets-checkmarxone-sast-scanner:cacd851159d01128b1ee8af3ec0e4d1b1b193489
      continue-on-error: true
      env:
        RUN_ID: ${{ cloudbees.run_id }}
        JOB_ID: ${{ job.id }}
        STEP_ID: ${{ step.internal.id }}
      run: |
        if [ -z "${{ inputs.severity }}" ]; then
          SEVERITY_FILTER="[]"
        else
          SEVERITY_FILTER="["
          SEVERITIES=$(echo "${{ inputs.severity }}" | tr ',' '\n')
          FIRST=true
          for severity in $SEVERITIES; do
            TRIMMED=$(echo "$severity" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            if [ "$FIRST" = "true" ]; then
              SEVERITY_FILTER="$SEVERITY_FILTER\"$TRIMMED\""
              FIRST=false
            else
              SEVERITY_FILTER="$SEVERITY_FILTER,\"$TRIMMED\""
            fi
          done
          SEVERITY_FILTER="$SEVERITY_FILTER]"
        fi
        export CHECKMARXONE_SAST_PROPS="{\"baseURL\": \"${{ inputs.url }}\", \"tenant\": \"${{ inputs.tenant }}\", \"apiKey\": \"${{ inputs.api-key }}\", \"severity\": $SEVERITY_FILTER}"
        /app/plugin-checkmarxone-sast-scanner -mode single

    - name: Complete execution plan
      uses: docker://020229604682.dkr.ecr.us-east-1.amazonaws.com/actions/assets-plugin-chain-utils:ff4d75579893f27f866232d22ed75aa699c0a7aa
      id: process-outputs
      with:
        entrypoint: assets-plugin-chain-utils
        args: process-outputs
      env:
        INPUT_CLOUDBEES_API_TOKEN: ${{ cloudbees.api.token }}
        INPUT_CLOUDBEES_API_URL: ${{ cloudbees.api.url }}
        INPUT_RUN_ID: ${{ cloudbees.run_id }}
        INPUT_WORKSPACE_DIR: ${{ inputs.workspace-dir }}